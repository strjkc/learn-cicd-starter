name: cd

on:
  push:
    branches: [main]
jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
      - name: Build Project
        run: scripts/buildprod.sh
  setup-gcloud:
    name: setup-gcloud
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: "read"
      id-token: "write"

    steps:
      - id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          workload_identity_provider: "projects/cicd-490919/locations/global/workloadIdentityPools/my-pool/providers/my-provider"
          service_account: "cloud-run-deployer@cicd-490919.iam.gserviceaccount.com"
      - name: "Set up Cloud SDK"
        uses: "google-github-actions/setup-gcloud@v3"
        with:
          version: ">= 363.0.0"

      - name: "Use gcloud CLI"
        run: "gcloud info"
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build, setup-gcloud]
    steps:
      - name: Upload
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/cicd-490919/notely-ar-repo/strjkc/notely:latest .
